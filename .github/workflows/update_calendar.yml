name: Update Aberdeen FC Calendar

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'

  # Manual run from Actions tab
  workflow_dispatch:

  # Run when code changes
  push:
    branches:
      - main
    paths:
      - 'update_calendar.py'
      - 'requirements.txt'
      - '.github/workflows/update-calendar.yml'

concurrency:
  group: aberdeen-fc-calendar
  cancel-in-progress: true

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ ! -f requirements.txt ]; then
            echo "ERROR: requirements.txt not found"
            exit 1
