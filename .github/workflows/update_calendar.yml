name: Update Aberdeen FC Calendar

on:
  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'update_calendar.py'
      - 'requirements.txt'
      - '.github/workflows/update-calendar.yml'

concurrency:
  group: aberdeen-fc-calendar
  cancel-in-progress: true

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run calendar update
        run: |
          python update_calendar.py

      - name: Verify calendar file exists
        run: |
          if [ ! -f "aberdeen_fc_fixtures.ics" ]; then
            echo "Calendar file not created"
            exit 1
          fi

      - name: Commit and push calendar
        run: |
          git config user.name "GitHub Actions"
          git config user.email "action@github.com"

          git add aberdeen_fc_fixtures.ics

          git commit -m "Update Aberdeen FC calendar $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"

          git push

      - name: Generate Summary
        run: |
          echo "## Aberdeen FC Calendar Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          COUNT=$(grep -c "BEGIN:VEVENT" aberdeen_fc_fixtures.ics || echo 0)

          echo "Fixtures generated: $COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Calendar URL:" >> $GITHUB_STEP_SUMMARY
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/aberdeen_fc_fixtures.ics" >> $GITHUB_STEP_SUMMARY
