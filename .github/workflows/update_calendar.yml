name: Update Aberdeen FC Calendar

on:
  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'update_calendar.py'
      - 'requirements.txt'

concurrency:
  group: aberdeen-calendar
  cancel-in-progress: true

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run calendar update script
        run: python update_calendar.py

      - name: Detect changes
        id: verify
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"

          git add .

          git commit -m "Update Aberdeen FC Calendar $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          git push

      - name: Summary
        run: |
          echo "## Aberdeen FC Calendar Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated: $(date -u)" >> $GITHUB_STEP_SUMMARY
